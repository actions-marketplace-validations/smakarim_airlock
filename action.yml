name: airlock audit
description: Catch typosquat, dependency-confusion, and malicious npm install-hook packages in a PR, before they run.
author: smakarim

branding:
  icon: shield
  color: blue

inputs:
  base:
    description: Path to the base branch package-lock.json (PR target)
    required: true
  head:
    description: Path to the head branch package-lock.json (PR branch)
    required: true
  fail-on:
    description: Minimum tier that fails the build (low|medium|high|critical)
    required: false
    default: high
  format:
    description: >
      Output format (human|json|sarif). This action defaults to sarif (so the
      output can be uploaded to GitHub code-scanning); note this differs from
      the airlock CLI binary's own default of human.
    required: false
    default: sarif
  registry:
    description: npm registry base URL
    required: false
    default: https://registry.npmjs.org
  allowlist:
    description: Allowlist file path
    required: false
    default: .airlockignore

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"

    - name: Install airlock
      shell: bash
      # actions/setup-go@v5 puts $(go env GOPATH)/bin on PATH, so the airlock
      # binary installed here is directly invocable in the next step.
      run: go install github.com/smakarim/airlock/cmd/airlock@latest

    - name: Run airlock audit
      shell: bash
      # Writes SARIF (or human/json) to stdout. To upload SARIF to GitHub
      # code-scanning, capture it to a file and follow with:
      #
      #   - uses: github/codeql-action/upload-sarif@v3
      #     with:
      #       sarif_file: airlock-results.sarif
      #
      # Example with file capture:
      #   run: airlock audit ... --format sarif > airlock-results.sarif
      run: |
        airlock audit \
          --base "${{ inputs.base }}" \
          --head "${{ inputs.head }}" \
          --fail-on "${{ inputs.fail-on }}" \
          --format "${{ inputs.format }}" \
          --registry "${{ inputs.registry }}" \
          --allowlist "${{ inputs.allowlist }}"
